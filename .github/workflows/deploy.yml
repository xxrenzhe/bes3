name: Build and Deploy Bes3

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: bes3-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'
  RUN_OPTIONAL_TESTS: ${{ vars.RUN_OPTIONAL_TESTS || 'false' }}
  ENABLE_SSH_DEPLOY: ${{ vars.ENABLE_SSH_DEPLOY || 'false' }}
  DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR || '/srv/bes3' }}
  DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
  DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL || 'http://127.0.0.1:3000/api/health' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Run optional tests
        if: ${{ env.RUN_OPTIONAL_TESTS == 'true' }}
        run: npm run test --if-present

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      deploy_image: ${{ steps.tags.outputs.deploy_image }}
      all_tags: ${{ steps.tags.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Set variables
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"
          REF_NAME_SAFE=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            PRIMARY_TAG="prod-${VERSION}"
            EXTRA_TAG="prod-${SHORT_SHA}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            PRIMARY_TAG="prod-latest"
            EXTRA_TAG="prod-${SHORT_SHA}"
          else
            PRIMARY_TAG="branch-${REF_NAME_SAFE}-${SHORT_SHA}"
            EXTRA_TAG=""
          fi

          DEPLOY_IMAGE="${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${PRIMARY_TAG}"
          ALL_TAGS="${DEPLOY_IMAGE}"
          if [[ -n "${EXTRA_TAG}" ]]; then
            ALL_TAGS="${ALL_TAGS},${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${EXTRA_TAG}"
          fi

          echo "deploy_image=${DEPLOY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${ALL_TAGS}" >> "$GITHUB_OUTPUT"

          echo "Primary image: ${DEPLOY_IMAGE}"
          echo "All tags:"
          echo "${ALL_TAGS}" | tr ',' '\n'

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=bes3-deploy
          cache-to: type=gha,mode=min,scope=bes3-deploy
          provenance: false
          sbom: false

      - name: Print image summary
        run: |
          echo "Deployed image:"
          echo "  ${{ steps.tags.outputs.deploy_image }}"
          echo "Published tags:"
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'

  deploy-via-ssh:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ env.ENABLE_SSH_DEPLOY == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    permissions:
      contents: read
      packages: read

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_ENV_PRODUCTION: ${{ secrets.DEPLOY_ENV_PRODUCTION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          for required in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_ENV_PRODUCTION; do
            if [[ -z "${!required:-}" ]]; then
              echo "::error::Missing required deploy secret: ${required}"
              exit 1
            fi
          done

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "${DEPLOY_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_APP_DIR}' '${DEPLOY_APP_DIR}/data' '${DEPLOY_APP_DIR}/storage/media'"

      - name: Upload compose files
        run: |
          scp -P "${DEPLOY_PORT}" docker-compose.yml Dockerfile "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/"

      - name: Upload production env file
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_APP_DIR}/.env.production'" <<'__BES3_ENV__'
          ${{ secrets.DEPLOY_ENV_PRODUCTION }}
          __BES3_ENV__

      - name: Deploy on remote host
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' <<'__BES3_REMOTE__'
          set -euo pipefail

          DEPLOY_APP_DIR='${{ env.DEPLOY_APP_DIR }}'
          DEPLOY_HEALTHCHECK_URL='${{ env.DEPLOY_HEALTHCHECK_URL }}'
          BES3_IMAGE='${{ needs.build-and-push.outputs.deploy_image }}'
          GHCR_USERNAME='${{ github.actor }}'
          GHCR_TOKEN=$(cat <<'__GHCR_TOKEN__'
          ${{ secrets.GITHUB_TOKEN }}
          __GHCR_TOKEN__
          )

          cd "${DEPLOY_APP_DIR}"

          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          BES3_IMAGE="${BES3_IMAGE}" docker compose pull
          BES3_IMAGE="${BES3_IMAGE}" docker compose up -d --no-build
          docker image prune -f || true

          if command -v curl >/dev/null 2>&1; then
            curl --fail --silent --show-error "${DEPLOY_HEALTHCHECK_URL}" >/dev/null
          else
            wget -qO- "${DEPLOY_HEALTHCHECK_URL}" >/dev/null
          fi
          __BES3_REMOTE__

      - name: Print deploy summary
        run: |
          echo "Bes3 deployed successfully."
          echo "Remote directory: ${{ env.DEPLOY_APP_DIR }}"
          echo "Image: ${{ needs.build-and-push.outputs.deploy_image }}"

# Required GitHub repository variables:
# - ENABLE_SSH_DEPLOY: true to enable server deployment, false to publish image only
# - DEPLOY_APP_DIR: remote app directory, defaults to /srv/bes3
# - DEPLOY_PORT: remote SSH port, defaults to 22
# - DEPLOY_HEALTHCHECK_URL: remote health URL, defaults to http://127.0.0.1:3000/api/health
#
# Required GitHub secrets for deploy-via-ssh:
# - DEPLOY_HOST
# - DEPLOY_USER
# - DEPLOY_SSH_KEY
# - DEPLOY_ENV_PRODUCTION
#
# Optional GitHub secret:
# - DEPLOY_SSH_KNOWN_HOSTS
