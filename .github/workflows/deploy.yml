name: Build Bes3 Release Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: bes3-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'
  RUN_OPTIONAL_TESTS: ${{ vars.RUN_OPTIONAL_TESTS || 'false' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run ESLint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Run optional tests
        if: ${{ env.RUN_OPTIONAL_TESTS == 'true' }}
        run: npm run test --if-present

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      deploy_image: ${{ steps.tags.outputs.deploy_image }}
      all_tags: ${{ steps.tags.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Set variables
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"
          REF_NAME_SAFE=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            PRIMARY_TAG="prod-${VERSION}"
            EXTRA_TAG="prod-${SHORT_SHA}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            PRIMARY_TAG="prod-latest"
            EXTRA_TAG="prod-${SHORT_SHA}"
          else
            PRIMARY_TAG="branch-${REF_NAME_SAFE}-${SHORT_SHA}"
            EXTRA_TAG=""
          fi

          DEPLOY_IMAGE="${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${PRIMARY_TAG}"
          ALL_TAGS="${DEPLOY_IMAGE}"
          if [[ -n "${EXTRA_TAG}" ]]; then
            ALL_TAGS="${ALL_TAGS},${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${EXTRA_TAG}"
          fi

          echo "deploy_image=${DEPLOY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${ALL_TAGS}" >> "$GITHUB_OUTPUT"

          echo "Primary image: ${DEPLOY_IMAGE}"
          echo "All tags:"
          echo "${ALL_TAGS}" | tr ',' '\n'

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=bes3-deploy
          cache-to: type=gha,mode=min,scope=bes3-deploy
          provenance: false
          sbom: false

      - name: Print image summary
        run: |
          echo "Release image:"
          echo "  ${{ steps.tags.outputs.deploy_image }}"
          echo "Published tags:"
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'

# Bes3 release flow from MustKnowV1:
# - Push to main: build and publish ghcr.io/xxrenzhe/bes3:prod-latest and prod-<commitid>
# - Push version tag v*.*.*: build and publish prod-<version> and prod-<commitid>
# - ClawCloud deployment stays manual: pull from GHCR and start the container on the server
