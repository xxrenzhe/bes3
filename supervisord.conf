[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid
user=root

[program:bes3-migrate]
directory=/app
command=./node_modules/.bin/tsx /app/scripts/migrate.ts
autostart=true
autorestart=false
startsecs=0
startretries=0
exitcodes=0
priority=5
stdout_logfile=/var/log/supervisor/bes3-migrate.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/bes3-migrate-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2

[program:bes3-web]
directory=/app
command=/bin/bash -lc "node /app/scripts/check-runtime-env.js && node server.js"
autostart=true
autorestart=true
startsecs=5
priority=10
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/bes3-web.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/bes3-web-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:bes3-worker]
directory=/app
command=./node_modules/.bin/tsx /app/scripts/worker-standalone.ts
autostart=true
autorestart=true
startsecs=5
priority=20
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/bes3-worker.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/bes3-worker-error.log
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=5
